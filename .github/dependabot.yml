# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      commitlint:
        patterns:
          - '@commitlint/*'
      oxc:
        patterns:
          - 'oxfmt'
          - 'oxlint'
          - 'eslint-plugin-oxlint'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '*/eslint-*'
          - 'typescript-eslint'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      vite:
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'
      vue:
        patterns:
          - 'vue'
          - 'vue-*'
          - '@vue/*'
